<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block titulo %}Sistema de Traslados{% endblock %}</title>

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

	<!-- Tailwind CSS CDN -->
	<script src="https://cdn.tailwindcss.com"></script>

	<!-- HTMX CDN -->
	<script src="https://unpkg.com/htmx.org@1.9.12"></script>

	<!-- Alpine.js CDN -->
	<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

	<!-- Configurar HTMX para enviar CSRF token en todas las peticiones -->
	<!-- htmx-config meta tag: leído por HTMX antes de disparar cualquier petición -->
	<meta name="htmx-config" content='{"requestClass":"htmx-request"}'>
	<script>
		// Inyectar el CSRF token en todas las peticiones HTMX via htmx:configRequest
		// Se usa htmx:configRequest en lugar de DOMContentLoaded para capturar
		// también las peticiones disparadas por hx-trigger="load"
		document.addEventListener ('htmx:configRequest', function (evt) {
			var csrfInput = document.querySelector ('[name=csrfmiddlewaretoken]');
			if (csrfInput) {
				evt.detail.headers ['X-CSRFToken'] = csrfInput.value;
				return;
			}
			// Fallback: leer desde cookie
			var csrfToken = document.cookie.split (';')
				.map (function (c) { return c.trim (); })
				.filter (function (c) { return c.startsWith ('csrftoken='); })
				.map (function (c) { return c.split ('=') [1]; }) [0];
			if (csrfToken) {
				evt.detail.headers ['X-CSRFToken'] = csrfToken;
			}
		});
	</script>

	{% block estilos %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">

	{% block contenido %}{% endblock %}

	{% load static %}
	<script src="{% static 'traslados/js/main.js' %}" defer></script>
	{% block scripts %}{% endblock %}
</body>
</html>
