<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Iniciar Sesión</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
	<div class="bg-white rounded-lg shadow-md p-8 w-full max-w-sm">
		<h1 class="text-xl font-bold text-blue-900 mb-6 text-center">Iniciar Sesión</h1>

		{% if form.errors %}
		<div class="bg-red-50 border border-red-200 rounded-md px-4 py-3 mb-4">
			<p class="text-sm text-red-700">Usuario o contraseña incorrectos.</p>
		</div>
		{% endif %}

		<form method="post" class="space-y-4">
			{% csrf_token %}
			<div>
				<label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
				<input
					type="text"
					name="username"
					id="id_username"
					autofocus
					class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
				>
			</div>
			<div>
				<label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
				<input
					type="password"
					name="password"
					id="id_password"
					class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
				>
			</div>
			<button
				type="submit"
				class="w-full px-4 py-2 rounded-md text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors"
			>
				Ingresar
			</button>
		</form>
	</div>
</body>
</html>
